# Builds the Angular frontend and publishes it to GitHub Pages.
# After merge: Repo → Settings → Pages → Build: GitHub Actions.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build for GitHub Pages
        working-directory: frontend
        env:
          BASE_HREF: /${{ github.event.repository.name }}/
        run: npx ng build --configuration production --base-href "$BASE_HREF"

      - name: SPA fallback (deep links / refresh)
        working-directory: frontend/dist/frontend/browser
        run: cp index.html 404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/frontend/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
